    :root {
      --bg:#0a0c10; --bg2:#111318; --bg3:#181c24;
      --border:#1e2330; --accent:#4c7cff; --accent2:#7b4fff;
      --green:#4ade80; --red:#f87171; --yellow:#fbbf24; --purple:#a78bfa; --orange:#fb923c;
      --text:#c9d1e0; --dim:#5a6478; --bright:#e8edf5;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh}

    .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    .stars::before{content:'';position:absolute;inset:0;
      background-image:
        radial-gradient(1px 1px at 15% 25%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 40% 60%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 65% 15%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 85% 70%,#fff 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 88%,rgba(255,255,255,.6) 0%,transparent 100%);
      opacity:.3;animation:tw 10s ease-in-out infinite alternate}
    @keyframes tw{0%{opacity:.2}100%{opacity:.4}}

    .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 24px}

    nav{display:flex;align-items:center;gap:16px;padding:28px 0;border-bottom:1px solid var(--border);margin-bottom:40px}
    .nav-back{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);text-decoration:none;transition:color .2s}
    .nav-back:hover{color:var(--accent)}
    .nav-sep{color:var(--border)}
    .nav-cur{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}

    .page-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
    .page-title{font-size:clamp(26px,5vw,38px);font-weight:700;color:var(--bright);margin-bottom:36px}

    /* 순자산 히어로 */
    .hero{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:28px;display:flex;flex-wrap:wrap;gap:32px;align-items:center}
    .hero-main{flex:1;min-width:200px}
    .hero-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
    .hero-val{font-family:'JetBrains Mono',monospace;font-size:clamp(24px,4vw,36px);font-weight:600;color:var(--bright);line-height:1}
    .hero-delta{font-size:13px;color:var(--green);margin-top:8px}

    .hero-goal{flex:1;min-width:220px}
    .goal-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
    .goal-val{font-size:13px;color:var(--text);margin-bottom:8px}
    .goal-val strong{color:var(--green)}
    .progress-bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green))}
    .goal-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-top:6px}

    /* 자산 배분 */
    .alloc-section{display:grid;grid-template-columns:240px 1fr;gap:24px;margin-bottom:28px;align-items:center}
    .chart-wrap{position:relative;width:200px;height:200px;margin:0 auto}
    .chart-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
    .chart-center-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--bright)}
    .chart-center-label{font-size:11px;color:var(--dim)}

    .legend{display:flex;flex-direction:column;gap:10px}
    .legend-item{display:flex;align-items:center;gap:10px}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .legend-name{font-size:13px;color:var(--text);flex:1}
    .legend-amt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--bright);text-align:right}
    .legend-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);width:36px;text-align:right}

    /* 카테고리 아코디언 */
    .categories{display:flex;flex-direction:column;gap:8px;margin-bottom:60px}
    .cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .cat-header{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;user-select:none;transition:background .15s}
    .cat-header:hover{background:var(--bg3)}
    .cat-icon{font-size:18px;flex-shrink:0}
    .cat-name{font-size:14px;font-weight:700;color:var(--bright);flex:1}
    .cat-amount{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}
    .cat-amount.positive{color:var(--bright)}
    .cat-amount.negative{color:var(--red)}
    .cat-delta{font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:8px}
    .cat-delta.up{color:var(--green)}
    .cat-delta.down{color:var(--red)}
    .cat-chevron{font-size:12px;color:var(--dim);transition:transform .25s;margin-left:8px}
    .cat-card.open .cat-chevron{transform:rotate(180deg)}

    .cat-body{display:none;border-top:1px solid var(--border)}
    .cat-card.open .cat-body{display:block}

    .sub-row{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border)}
    .sub-row:last-child{border-bottom:none}
    .sub-row-icon{font-size:14px;flex-shrink:0;margin-top:2px;opacity:.7}
    .sub-row-info{flex:1}
    .sub-row-name{font-size:13px;color:var(--bright)}
    .sub-row-note{font-size:11px;color:var(--dim);margin-top:3px}
    .sub-row-right{text-align:right;flex-shrink:0}
    .sub-row-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--bright)}
    .sub-row-amt.neg{color:var(--red)}
    .sub-row-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px}
    .sub-row-sub.up{color:var(--green)}
    .sub-row-sub.down{color:var(--red)}

    .cat-summary{padding:14px 20px;background:var(--bg3);font-size:12px;color:var(--dim);line-height:1.7}

    /* 브로커 서브 아코디언 */
    .broker-section{border-top:1px solid var(--border)}
    .broker-header{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;user-select:none;transition:background .15s}
    .broker-header:hover{background:rgba(255,255,255,.03)}
    .broker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .broker-name{font-size:13px;font-weight:700;color:var(--bright);flex:1}
    .broker-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-right:8px}
    .broker-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--bright)}
    .broker-chevron{font-size:10px;color:var(--dim);transition:transform .25s;margin-left:10px}
    .broker-section.open .broker-chevron{transform:rotate(180deg)}
    .broker-body{display:none;border-top:1px solid rgba(255,255,255,.06)}
    .broker-section.open .broker-body{display:block}
    .holding-row{display:flex;align-items:center;gap:10px;padding:8px 20px 8px 42px;border-bottom:1px solid rgba(255,255,255,.04)}

    .holding-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);width:36px;text-align:right}

    footer{border-top:1px solid var(--border);padding:36px 0;text-align:center;margin-top:20px}
    .footer-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim)}

    @media(max-width:640px){
      .alloc-section{grid-template-columns:1fr}
      .chart-wrap{width:160px;height:160px}
      .hero{flex-direction:column;gap:20px}
    }
  </style>
</head>

// ── 숫자 포맷 ─────────────────────────────────────────────────
function fmt(n, sign = false) {
  const abs = Math.abs(n);
  let s;
  if (abs >= 1e8)      s = (abs / 1e8).toFixed(1).replace(/\.0$/, '') + '억';
  else if (abs >= 1e4) s = Math.round(abs / 1e4) + '만';
  else                 s = abs.toLocaleString();
  // 억+만 조합
  if (abs >= 1e8 && abs % 1e8 >= 1e4) {
    const uk = Math.floor(abs / 1e8);
    const man = Math.round((abs % 1e8) / 1e4);
    s = uk + '억 ' + man + '만';
  }
  return (sign && n > 0 ? '+' : n < 0 ? '-' : '') + s;
}
function fmtFull(n) {
  return (n < 0 ? '-' : '') + Math.abs(n).toLocaleString() + '원';

      return `
        <div class="broker-section" id="broker-${b.id}">
          <div class="broker-header" onclick="toggleBroker('${b.id}')">
            <div class="broker-dot" style="background:${b.color}"></div>
            <span class="broker-name">${b.name}</span>
            <span class="broker-count">${b.holdings.length}종목</span>
            <span class="broker-amt">${fmt(b.amount)}원</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-left:6px">${pct}%</span>
            <span class="broker-chevron">▼</span>
          </div>
          <div class="broker-body">${holdingsHtml}</div>
        </div>`;
    }).join('');
  } else {
    itemsHtml = cat.items.map(item => {
      const isItemNeg = item.amount < 0;
      const subHtml = item.sub
        ? `<div class="sub-row-sub ${item.sub.startsWith('▲') ? 'up' : ''}">${item.sub}</div>`
        : '';
      return `
        <div class="sub-row">
          <div class="sub-row-icon">•</div>
          <div class="sub-row-info">
            <div class="sub-row-name">${item.name}</div>
            ${item.note ? `<div class="sub-row-note">${item.note}</div>` : ''}
          </div>
          <div class="sub-row-right">
            <div class="sub-row-amt ${isItemNeg ? 'neg' : ''}">${fmtFull(item.amount)}</div>
            ${subHtml}
          </div>
        </div>`;
    }).join('');
  }

  const noteHtml = cat.note
    ? `<div class="cat-summary">${cat.note}</div>`
    : '';

  catEl.innerHTML += `
    <div class="cat-card" id="cat-${cat.id}">
      <div class="cat-header" onclick="toggle('${cat.id}')">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-amount ${isNeg ? 'negative' : 'positive'}">${fmtFull(cat.amount)}</span>
        ${deltaHtml}
        <span class="cat-chevron">▼</span>
      </div>
      <div class="cat-body">
        ${itemsHtml}
        ${noteHtml}
      </div>
    </div>`;
});

function toggle(id) {
  document.getElementById('cat-' + id).classList.toggle('open');
}

function toggleBroker(id) {
  document.getElementById('broker-' + id).classList.toggle('open');
}

// 부동산·대출 기본 열기
['realestate','loan'].forEach(id => {
  document.getElementById('cat-' + id)?.classList.add('open');
});
</script>
